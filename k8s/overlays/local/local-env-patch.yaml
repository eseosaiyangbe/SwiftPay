# Local only: set NODE_ENV=development so apps allow default DB password (swiftpay123).
# EKS overlay never uses this; production keeps NODE_ENV=production and real secrets.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: swiftpay
spec:
  template:
    spec:
      containers:
      - name: api-gateway
        env:
        - name: NODE_ENV
          value: "development"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: swiftpay
spec:
  template:
    spec:
      containers:
      - name: auth-service
        env:
        - name: NODE_ENV
          value: "development"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: swiftpay
spec:
  template:
    spec:
      containers:
      - name: wallet-service
        env:
        - name: NODE_ENV
          value: "development"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: swiftpay
spec:
  template:
    spec:
      containers:
      - name: transaction-service
        env:
        - name: NODE_ENV
          value: "development"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: swiftpay
spec:
  template:
    spec:
      containers:
      - name: notification-service
        env:
        - name: NODE_ENV
          value: "development"
---
# nginx resolver must be an IP address — hostnames are not supported by nginx.
# kube-dns ClusterIP in MicroK8s is fixed at 10.152.183.10.
# EKS/AKS overlays set their own NGINX_RESOLVER via their env patches.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: swiftpay
spec:
  template:
    spec:
      containers:
      - name: frontend
        env:
        - name: NGINX_RESOLVER
          value: "10.152.183.10"
