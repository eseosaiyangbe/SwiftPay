apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-secrets-external
  namespace: swiftpay-dev
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: db-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: internal-developer-platform/swiftpay/dev/postgres
        property: DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: internal-developer-platform/swiftpay/dev/postgres
        property: DB_PASSWORD
    - secretKey: DB_HOST
      remoteRef:
        key: internal-developer-platform/swiftpay/dev/postgres
        property: DB_HOST
    - secretKey: DB_PORT
      remoteRef:
        key: internal-developer-platform/swiftpay/dev/postgres
        property: DB_PORT
    - secretKey: JWT_SECRET
      remoteRef:
        key: internal-developer-platform/swiftpay/dev/app
        property: JWT_SECRET
    - secretKey: REDIS_URL
      remoteRef:
        key: internal-developer-platform/swiftpay/dev/redis
        property: REDIS_URL
    - secretKey: RABBITMQ_USER
      remoteRef:
        key: internal-developer-platform/swiftpay/dev/rabbitmq
        property: RABBITMQ_USER
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: internal-developer-platform/swiftpay/dev/rabbitmq
        property: RABBITMQ_PASSWORD
    - secretKey: RABBITMQ_URL
      remoteRef:
        key: internal-developer-platform/swiftpay/dev/rabbitmq
        property: RABBITMQ_URL
