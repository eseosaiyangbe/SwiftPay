apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: swiftpay
  namespace: swiftpay-prod
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - swiftpay.eseosadevbox.com
      secretName: swiftpay-frontend-prod-tls
    - hosts:
        - api.swiftpay.eseosadevbox.com
      secretName: swiftpay-api-prod-tls
  rules:
    - host: swiftpay.eseosadevbox.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.swiftpay.eseosadevbox.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
