# Local overlay: use IfNotPresent so pods don't hit the network registry on
# every restart. Images are loaded into containerd directly on local clusters.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: payflow
spec:
  template:
    spec:
      containers:
      - name: api-gateway
        imagePullPolicy: IfNotPresent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: payflow
spec:
  template:
    spec:
      containers:
      - name: auth-service
        imagePullPolicy: IfNotPresent
