apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: swiftpay
spec:
  template:
    spec:
      containers:
        - name: api-gateway
          env:
            - name: NODE_ENV
              value: "development"
            - name: CONTAINER_ENV
              value: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: swiftpay
spec:
  template:
    spec:
      containers:
        - name: auth-service
          env:
            - name: NODE_ENV
              value: "development"
            - name: CONTAINER_ENV
              value: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: swiftpay
spec:
  template:
    spec:
      containers:
        - name: wallet-service
          env:
            - name: NODE_ENV
              value: "development"
            - name: CONTAINER_ENV
              value: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: swiftpay
spec:
  template:
    spec:
      containers:
        - name: transaction-service
          env:
            - name: NODE_ENV
              value: "development"
            - name: CONTAINER_ENV
