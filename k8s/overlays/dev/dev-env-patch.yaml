---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: swiftpay
spec:
  template:
    spec:
      containers:
        - name: notification-service
          env:
            - name: NODE_ENV
              value: "development"
            - name: CONTAINER_ENV
              value: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: swiftpay
spec:
  template:
    spec:
      containers:
        - name: frontend
          env:
            - name: API_GATEWAY_URL
              value: "http://api-gateway.swiftpay-dev.svc.cluster.local:80"
            - name: NGINX_RESOLVER
              value: "10.43.0.10"
